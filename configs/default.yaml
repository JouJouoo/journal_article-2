scenario:
  num_agents: 8
  num_nodes: 5
  horizon: 24
  delta_t: 1.0
  seed: 7
  profile_path: ""
  load_scale: 1.0
  pv_scale: 1.0
  load_noise_scale: 1.0
  pv_noise_scale: 1.0

network:
  voltage_ref: 1.0
  voltage_min: 0.95
  voltage_max: 1.05
  default_resistance: 0.003
  default_reactance: 0.0
  default_line_capacity: 10.0

market:
  p2p_price_min: 0.2
  p2p_price_max: 1.2
  max_buy_power: 3.0
  max_sell_power: 3.0
  grid_buy_base: 0.82
  grid_sell_base: 0.35
  carbon_allowance_price: 0.06
  low_carbon_sell_price: 0.03
  grid_emission_base: 0.58
  pv_credit_beta: 1.0

storage:
  capacity: 5.0
  soc_min: 0.5
  soc_max: 4.5
  init_soc: 2.5
  charge_efficiency: 0.95
  discharge_efficiency: 0.95
  max_charge_power: 1.5
  max_discharge_power: 1.5
  op_cost: 0.01

lccoins:
  alpha_q: 1.0
  alpha_offset: 0.5
  kappa: 0.2
  q_norm: 5.0
  offset_norm: 3.0
  reward_mode: adaptive
  reward_clip: 0.5
  kappa_min: 0.0
  kappa_max: 0.5
  adaptive_ema: 0.2
  adaptive_violation_gain: 2.0
  adaptive_rejection_gain: 1.0

clearing:
  enable_dynamic_action_bounds: true
  local_trade_margin: 1.2
  local_storage_margin: 1.0
  action_saturation_penalty: 0.02
  max_repair_iters: 20
  repair_shrink: 0.9
  network_tolerance: 0.0001
  violation_penalty: 20.0
  enable_safety_shield: true
  safety_storage_fraction: 1.0
  enable_emergency_balancing: true
  max_emergency_iters: 20
  emergency_balance_shrink: 0.7
  load_shed_penalty: 5.0
  pv_curtail_penalty: 0.5
  lagrange_step_size: 0.05
  preserve_lagrange_on_reset: false
  adaptive_violation_penalty_gain: 0.5
  violation_penalty_max_multiplier: 5.0

rl:
  hidden_dim: 64
  recurrent_dim: 64
  actor_lr: 0.0003
  critic_lr: 0.001
  gamma: 0.98
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  update_epochs: 3
  batch_size: 128
  episodes: 20
  seed: 7
  device: cpu
